<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Intine</title>
  <meta name="description" content="Thank you for contacting Intine. We'll be in touch soon." />
  <meta property="og:title" content="Thank You — Intine" />
  <meta property="og:description" content="Thank you for contacting Intine. We'll be in touch soon." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.intine.co.in/thank-you" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="assets/icons/favicon.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <div class="bg-animation"></div>

  <header id="header">
    <a href="index.html" class="logo">
      <img src="assets/logos/logo-white.png" alt="Intine Logo" class="logo-mark">
      <img src="assets/logos/wordmark-white.png" alt="Intine Wordmark" class="logo-wordmark">
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="work.html">Work</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="work-hero-cinematic thank-you-hero" style="min-height: 70vh;">
    <div class="hero-content">
      <p class="thank-you-eyebrow" aria-hidden="true">Message received</p>
      <h1 class="hero-title">Thank you.</h1>
      <p class="hero-subtitle">We've received your inquiry and will get back to you soon at the email you provided.</p>
      <a href="index.html" class="btn-primary thank-you-cta">Back to Home</a>
    </div>
  </section>

  <style>
    .thank-you-hero .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1.25rem;
    }
    .thank-you-eyebrow {
      color: var(--soft-white);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0;
      opacity: 0;
      animation: thankYouFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }
    .thank-you-hero .hero-title,
    .thank-you-hero .hero-subtitle {
      opacity: 0;
      animation: thankYouFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .thank-you-hero .hero-title { animation-delay: 0.35s; }
    .thank-you-hero .hero-subtitle {
      animation-delay: 0.5s;
      max-width: 32rem;
    }
    .thank-you-cta {
      margin-top: 1rem;
      opacity: 0;
      animation: thankYouFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.65s forwards;
    }
    @keyframes thankYouFadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <footer class="site-footer">
    <nav class="footer-nav" aria-label="Legal and policies">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="refund.html">Refunds</a>
      <a href="delivery.html">Delivery</a>
      <a href="disclaimer.html">Disclaimer</a>
    </nav>
    <p class="footer-copy">© 2020 Intine. All rights reserved.</p>
  </footer>
  <script src="js/main.js"></script>
</body>
</html>
